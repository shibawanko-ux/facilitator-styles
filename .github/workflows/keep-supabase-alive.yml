name: Keep Supabase Alive

on:
  schedule:
    # 5日おきに実行（UTC 00:00）
    - cron: '0 0 */5 * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app_Facilitator_reflection (Supabase)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.FACILITATOR_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.FACILITATOR_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.FACILITATOR_SUPABASE_ANON_KEY }}")
          echo "Facilitator reflection: HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "::warning::Facilitator reflection ping returned $STATUS"
          fi

      - name: Ping app_SystemCoaching_team_survey (Supabase)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.TEAM_SURVEY_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.TEAM_SURVEY_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.TEAM_SURVEY_SUPABASE_ANON_KEY }}")
          echo "Team survey: HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "::warning::Team survey ping returned $STATUS"
          fi
